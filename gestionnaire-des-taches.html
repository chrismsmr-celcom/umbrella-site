<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Productivity | Umbrella®</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #f5c400;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --urgent: #ff4757;
            --normal: #3498db;
            --success: #2ed573;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        .todo-card {
            width: 100%; max-width: 600px;
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 32px; border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; }
        h1 { font-weight: 800; font-size: 1.5rem; color: var(--accent); }
        
        /* POMODORO SECTION */
        .pomodoro-box {
            background: rgba(255,255,255,0.03);
            padding: 25px; border-radius: 24px; border: 1px solid var(--border);
            text-align: center; margin-bottom: 30px;
        }
        #timerDisplay { font-size: 3.5rem; font-weight: 800; letter-spacing: -3px; line-height: 1; margin-bottom: 5px; }
        #timerStatus { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; margin-bottom: 15px; color: var(--accent); }
        
        .timer-controls { display: flex; justify-content: center; gap: 10px; }
        .timer-btn {
            padding: 10px 20px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 0.75rem;
        }
        #startBtn { background: var(--accent); color: var(--primary); }
        #resetBtn { background: rgba(255,255,255,0.1); color: #fff; }
        .timer-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* PROGRESS BAR */
        .progress-label { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 800; margin-bottom: 10px; color: #94a3b8; }
        .progress-wrapper { background: rgba(255,255,255,0.05); height: 8px; border-radius: 20px; margin-bottom: 30px; overflow: hidden; border: 1px solid var(--border); }
        #progressBar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--success)); transition: 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        /* INPUT AREA */
        .input-box { display: grid; grid-template-columns: 1fr 120px 50px; gap: 10px; margin-bottom: 30px; }
        input, select {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 12px 15px; border-radius: 12px; color: white; outline: none; font-size: 0.9rem;
        }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); }
        select { cursor: pointer; color: var(--accent); font-weight: 600; }
        .add-btn { background: var(--accent); border: none; border-radius: 12px; color: var(--primary); cursor: pointer; font-weight: 800; transition: 0.3s; }
        .add-btn:hover { transform: scale(1.05); }

        /* TASK LIST */
        #taskContainer { max-height: 350px; overflow-y: auto; padding-right: 5px; }
        #taskContainer::-webkit-scrollbar { width: 4px; }
        #taskContainer::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .task-item {
            background: rgba(255,255,255,0.02); border: 1px solid var(--border);
            padding: 15px; border-radius: 18px; display: flex; align-items: center; 
            margin-bottom: 12px; transition: 0.3s; animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } }
        .task-item:hover { transform: translateX(5px); background: rgba(255,255,255,0.05); }
        
        .priority-dot { width: 4px; height: 30px; border-radius: 10px; margin-right: 15px; }
        .p-high { background: var(--urgent); box-shadow: 0 0 10px rgba(255, 71, 87, 0.3); }
        .p-low { background: var(--normal); }

        .task-info { flex: 1; cursor: pointer; }
        .task-info h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 2px; }
        .task-info span { font-size: 0.65rem; color: #64748b; text-transform: uppercase; }

        .check-btn { 
            width: 24px; height: 24px; border-radius: 8px; border: 2px solid var(--border); 
            cursor: pointer; margin-right: 15px; display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .completed .check-btn { background: var(--success); border-color: var(--success); }
        .completed .task-info h3 { text-decoration: line-through; opacity: 0.4; }
        .completed { opacity: 0.6; }

        .del-btn { background: none; border: none; color: #334155; cursor: pointer; padding: 8px; transition: 0.2s; }
        .del-btn:hover { color: var(--urgent); }

        .footer-link { display: block; text-align: center; margin-top: 30px; color: #475569; text-decoration: none; font-size: 0.8rem; }
        .footer-link:hover { color: #94a3b8; }
    </style>
</head>
<body>

    <div class="todo-card">
        <div class="header">
            <div>
                <h1>Focus Lab Pro</h1>
                <p style="color: #64748b; font-size: 0.8rem;">Umbrella® Ecosystem</p>
            </div>
            <i class="fa fa-shield-halved" style="color: var(--accent); font-size: 1.2rem;"></i>
        </div>

        <div class="pomodoro-box">
            <div id="timerStatus">Session de Focus</div>
            <div id="timerDisplay">25:00</div>
            <div class="timer-controls">
                <button id="startBtn" class="timer-btn" onclick="toggleTimer()">DÉMARRER</button>
                <button id="resetBtn" class="timer-btn" onclick="resetTimer()">RESET</button>
            </div>
        </div>

        <div class="progress-label">
            <span>Progression Quête</span>
            <span id="scoreText">0%</span>
        </div>
        <div class="progress-wrapper"><div id="progressBar"></div></div>

        <div class="input-box">
            <input type="text" id="tInput" placeholder="Action à mener..." onkeypress="if(event.key === 'Enter') addTask()">
            <select id="pInput">
                <option value="high">URGENT</option>
                <option value="low" selected>NORMAL</option>
            </select>
            <button class="add-btn" onclick="addTask()"><i class="fa fa-plus"></i></button>
        </div>

        <div id="taskContainer"></div>

        <a href="#" class="footer-link">
            <i class="fa fa-arrow-left"></i> Quitter le mode focus
        </a>
    </div>

<script>
    // --- LOGIQUE DES TÂCHES ---
    let tasks = JSON.parse(localStorage.getItem('umbrella_pro_tasks')) || [];

    function addTask() {
        const input = document.getElementById('tInput');
        const text = input.value.trim();
        const priority = document.getElementById('pInput').value;
        if(!text) return;

        tasks.push({ id: Date.now(), text, priority, done: false });
        input.value = "";
        save();
    }

    function toggle(id) {
        tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
        save();
    }

    function remove(id) {
        tasks = tasks.filter(t => t.id !== id);
        save();
    }

    function save() {
        localStorage.setItem('umbrella_pro_tasks', JSON.stringify(tasks));
        render();
    }

    function render() {
        const container = document.getElementById('taskContainer');
        container.innerHTML = "";
        let completedCount = 0;

        tasks.sort((a, b) => {
            if (a.done !== b.done) return a.done ? 1 : -1;
            if (a.priority !== b.priority) return a.priority === 'high' ? -1 : 1;
            return b.id - a.id;
        });

        tasks.forEach(t => {
            if(t.done) completedCount++;
            const div = document.createElement('div');
            div.className = `task-item ${t.done ? 'completed' : ''}`;
            div.innerHTML = `
                <div class="check-btn" onclick="toggle(${t.id})">
                    ${t.done ? '<i class="fa fa-check" style="color:#fff; font-size:0.7rem;"></i>' : ''}
                </div>
                <div class="priority-dot ${t.priority === 'high' ? 'p-high' : 'p-low'}"></div>
                <div class="task-info" onclick="toggle(${t.id})">
                    <h3>${t.text}</h3>
                    <span>${t.priority === 'high' ? 'Critique' : 'Standard'}</span>
                </div>
                <button class="del-btn" onclick="remove(${t.id})"><i class="fa fa-trash-alt"></i></button>
            `;
            container.appendChild(div);
        });

        const percent = tasks.length > 0 ? Math.round((completedCount / tasks.length) * 100) : 0;
        document.getElementById('progressBar').style.width = percent + "%";
        document.getElementById('scoreText').innerText = percent + "%";
    }

    // --- LOGIQUE POMODORO ---
    let timeLeft = 25 * 60;
    let timerId = null;
    let isWorking = true;

    function updateTimerDisplay() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        const timeStr = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        document.getElementById('timerDisplay').innerText = timeStr;
        document.title = `(${timeStr}) Focus Lab`;
    }

    function toggleTimer() {
        const btn = document.getElementById('startBtn');
        if (timerId) {
            clearInterval(timerId);
            timerId = null;
            btn.innerText = "REPRENDRE";
            btn.style.background = "var(--accent)";
        } else {
            btn.innerText = "PAUSE";
            btn.style.background = "var(--urgent)";
            timerId = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    timerId = null;
                    completeSession();
                }
            }, 1000);
        }
    }

    function completeSession() {
        isWorking = !isWorking;
        timeLeft = isWorking ? 25 * 60 : 5 * 60;
        
        const status = document.getElementById('timerStatus');
        const display = document.getElementById('timerDisplay');
        
        if (isWorking) {
            status.innerText = "Session de Focus";
            status.style.color = "var(--accent)";
            display.style.color = "#fff";
        } else {
            status.innerText = "Pause Relax";
            status.style.color = "var(--success)";
            display.style.color = "var(--success)";
        }
        
        // Notification sonore système (optionnel)
        alert(isWorking ? "Fin de la pause ! Retour au travail." : "Session terminée ! Prends 5 minutes.");
        updateTimerDisplay();
        toggleTimer();
    }

    function resetTimer() {
        clearInterval(timerId);
        timerId = null;
        isWorking = true;
        timeLeft = 25 * 60;
        document.getElementById('startBtn').innerText = "DÉMARRER";
        document.getElementById('startBtn').style.background = "var(--accent)";
        document.getElementById('timerStatus').innerText = "Session de Focus";
        document.getElementById('timerStatus').style.color = "var(--accent)";
        document.getElementById('timerDisplay').style.color = "#fff";
        updateTimerDisplay();
    }

    render();
    updateTimerDisplay();
</script>
</body>
</html>
