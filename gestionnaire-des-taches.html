<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Focus Lab Pro | Umbrella® - Gestionnaire de Tâches & Pomodoro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e293b;
            --primary-light: #334155;
            --accent: #f5c400;
            --accent-dark: #e6b800;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --urgent: #ef4444;
            --urgent-light: #fee2e2;
            --normal: #3b82f6;
            --normal-light: #dbeafe;
            --success: #10b981;
            --success-light: #d1fae5;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --text: #1e293b;
            --text-muted: #64748b;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg);
            color: var(--text); 
            min-height: 100vh; 
            padding: 20px;
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            background: var(--card);
            border-radius: 12px;
            padding: 14px 20px;
            min-width: 280px;
            max-width: 380px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideInRight 0.3s ease;
            border-left: 4px solid;
            color: var(--text);
        }

        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--urgent); }
        .toast.info { border-left-color: var(--accent); }
        .toast.warning { border-left-color: var(--warning); }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .todo-card {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card);
            padding: 40px;
            border-radius: 32px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            flex-wrap: wrap;
            gap: 15px;
        }
        
        h1 { 
            font-weight: 800; 
            font-size: 1.8rem; 
            color: var(--primary);
        }
        
        .stats-badge {
            display: flex;
            gap: 15px;
            background: var(--bg);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        .stats-badge span {
            color: var(--accent);
            font-weight: 700;
        }
        
        /* POMODORO SECTION */
        .pomodoro-box {
            background: var(--bg);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid var(--border);
            text-align: center;
            margin-bottom: 30px;
        }
        
        #timerDisplay { 
            font-size: 4rem; 
            font-weight: 800; 
            letter-spacing: -2px; 
            line-height: 1; 
            margin-bottom: 10px;
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
            color: var(--primary);
        }
        
        #timerStatus { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-weight: 700; 
            margin-bottom: 15px; 
            color: var(--accent);
        }
        
        /* Time Settings */
        .time-settings {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .time-setting {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .time-setting label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .time-input {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 5px 12px;
        }
        
        .time-input input {
            width: 50px;
            text-align: center;
            border: none;
            background: transparent;
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary);
            outline: none;
            padding: 5px 0;
        }
        
        .time-input button {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 0 5px;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        
        .time-input button:hover {
            color: var(--accent);
        }
        
        .timer-controls { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            margin-top: 15px;
        }
        
        .timer-btn {
            padding: 10px 24px;
            border-radius: 40px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        #startBtn { background: var(--accent); color: var(--primary); }
        #pauseBtn { background: var(--warning); color: white; display: none; }
        #resetBtn { background: var(--border); color: var(--text-muted); }
        .timer-btn:hover { transform: translateY(-2px); filter: brightness(0.95); }

        /* PROGRESS BAR */
        .progress-label { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.75rem; 
            font-weight: 800; 
            margin-bottom: 10px; 
            color: var(--text-muted);
        }
        
        .progress-wrapper { 
            background: var(--border); 
            height: 8px; 
            border-radius: 20px; 
            margin-bottom: 30px; 
            overflow: hidden;
        }
        
        #progressBar { 
            height: 100%; 
            width: 0%; 
            background: linear-gradient(90deg, var(--accent), var(--success)); 
            transition: 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67); 
        }

        /* INPUT AREA */
        .input-box { 
            display: grid; 
            grid-template-columns: 1fr 120px 50px; 
            gap: 12px; 
            margin-bottom: 25px; 
        }
        
        input, select {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 14px 16px;
            border-radius: 14px;
            color: var(--text);
            outline: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        
        input:focus, select:focus { 
            border-color: var(--accent); 
            box-shadow: 0 0 0 2px rgba(245, 196, 0, 0.2);
        }
        
        select { cursor: pointer; color: var(--accent); font-weight: 600; background: var(--bg); }
        
        .add-btn { 
            background: var(--accent); 
            border: none; 
            border-radius: 14px; 
            color: var(--primary); 
            cursor: pointer; 
            font-weight: 800; 
            transition: 0.3s;
            font-size: 1.2rem;
        }
        
        .add-btn:hover { transform: scale(1.05); background: var(--accent-dark); }

        /* FILTER TABS */
        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: 0.3s;
            color: var(--text-muted);
        }
        
        .filter-btn.active {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
        }
        
        .filter-btn:hover:not(.active) {
            background: var(--border);
        }

        /* TASK LIST */
        #taskContainer { 
            max-height: 400px; 
            overflow-y: auto; 
            padding-right: 5px;
        }
        
        #taskContainer::-webkit-scrollbar { width: 4px; }
        #taskContainer::-webkit-scrollbar-track { background: var(--border); border-radius: 10px; }
        #taskContainer::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .task-item {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            transition: 0.3s;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } }
        .task-item:hover { transform: translateX(5px); background: #f1f5f9; }
        
        .priority-dot { 
            width: 4px; 
            height: 36px; 
            border-radius: 4px; 
            margin-right: 15px; 
        }
        .p-high { background: var(--urgent); }
        .p-low { background: var(--normal); }

        .task-info { flex: 1; cursor: pointer; }
        .task-info h3 { 
            font-size: 0.95rem; 
            font-weight: 600; 
            margin-bottom: 4px;
            word-break: break-word;
            color: var(--text);
        }
        .task-info span { 
            font-size: 0.65rem; 
            color: var(--text-muted); 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .check-btn { 
            width: 26px; 
            height: 26px; 
            border-radius: 8px; 
            border: 2px solid var(--border); 
            cursor: pointer; 
            margin-right: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: 0.2s;
            background: var(--card);
        }
        
        .check-btn:hover { border-color: var(--accent); }
        .completed .check-btn { background: var(--success); border-color: var(--success); }
        .completed .check-btn i { color: white; }
        .completed .task-info h3 { text-decoration: line-through; opacity: 0.6; }
        .completed { opacity: 0.7; }

        .del-btn { 
            background: none; 
            border: none; 
            color: var(--text-muted); 
            cursor: pointer; 
            padding: 8px; 
            transition: 0.2s;
            border-radius: 8px;
        }
        .del-btn:hover { color: var(--urgent); background: var(--urgent-light); }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.3;
            color: var(--text-muted);
        }
        
        .footer-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 25px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        
        .footer-link:hover { color: var(--accent); transform: translateX(-3px); }
        
        .action-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 10px;
        }
        
        .action-btn-small {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
            transition: 0.3s;
            color: var(--text-muted);
        }
        
        .action-btn-small:hover {
            background: var(--border);
            color: var(--primary);
        }
        
        @media (max-width: 550px) {
            .todo-card { padding: 25px; }
            .input-box { grid-template-columns: 1fr 100px 45px; gap: 8px; }
            .timer-controls { flex-wrap: wrap; }
            #timerDisplay { font-size: 3rem; }
            .header { flex-direction: column; align-items: flex-start; }
            .time-settings { gap: 10px; }
            .time-input input { width: 45px; }
        }
    </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="todo-card">
    <div class="header">
        <div>
            <h1>Focus Lab Pro</h1>
            <p style="color: var(--text-muted); font-size: 0.8rem;"><i class="fa fa-clock"></i> Pomodoro personnalisable • Tâches • Productivité</p>
        </div>
        <div class="stats-badge">
            <i class="fa fa-tasks"></i> Tâches: <span id="totalTasks">0</span>
            <i class="fa fa-check-circle"></i> Complétées: <span id="completedTasks">0</span>
        </div>
    </div>

    <div class="pomodoro-box">
        <div id="timerStatus"><i class="fa fa-hourglass-half"></i> Session de Focus</div>
        <div id="timerDisplay">25:00</div>
        
        <!-- Time Settings -->
        <div class="time-settings">
            <div class="time-setting">
                <label><i class="fa fa-brain"></i> Focus</label>
                <div class="time-input">
                    <button onclick="adjustTime('focus', -1)"><i class="fa fa-minus"></i></button>
                    <input type="number" id="focusTime" value="25" min="1" max="60" step="1" onchange="updateTimerFromSettings()">
                    <button onclick="adjustTime('focus', 1)"><i class="fa fa-plus"></i></button>
                    <span style="font-size: 0.8rem;">min</span>
                </div>
            </div>
            <div class="time-setting">
                <label><i class="fa fa-coffee"></i> Pause</label>
                <div class="time-input">
                    <button onclick="adjustTime('break', -1)"><i class="fa fa-minus"></i></button>
                    <input type="number" id="breakTime" value="5" min="1" max="30" step="1" onchange="updateTimerFromSettings()">
                    <button onclick="adjustTime('break', 1)"><i class="fa fa-plus"></i></button>
                    <span style="font-size: 0.8rem;">min</span>
                </div>
            </div>
            <div class="time-setting">
                <label><i class="fa fa-arrows-spin"></i> Cycles</label>
                <div class="time-input">
                    <button onclick="adjustCycles(-1)"><i class="fa fa-minus"></i></button>
                    <input type="number" id="cyclesCount" value="4" min="1" max="10" step="1" onchange="updateTimerFromSettings()">
                    <button onclick="adjustCycles(1)"><i class="fa fa-plus"></i></button>
                    <span style="font-size: 0.8rem;">avant pause longue</span>
                </div>
            </div>
        </div>
        
        <div class="timer-controls">
            <button id="startBtn" class="timer-btn" onclick="startTimer()"><i class="fa fa-play"></i> DÉMARRER</button>
            <button id="pauseBtn" class="timer-btn" onclick="pauseTimer()"><i class="fa fa-pause"></i> PAUSE</button>
            <button id="resetBtn" class="timer-btn" onclick="resetTimer()"><i class="fa fa-undo"></i> RESET</button>
        </div>
        <div style="margin-top: 15px; font-size: 0.7rem; color: var(--text-muted);">
            <i class="fa fa-chart-simple"></i> Cycles complétés: <span id="pomodoroCount">0</span>
            <span style="margin-left: 15px;"><i class="fa fa-flag-checkered"></i> Cycle actuel: <span id="currentCycle">1</span>/<span id="targetCycles">4</span></span>
        </div>
    </div>

    <div class="progress-label">
        <span><i class="fa fa-chart-line"></i> Progression</span>
        <span id="scoreText">0%</span>
    </div>
    <div class="progress-wrapper"><div id="progressBar"></div></div>

    <div class="filter-tabs">
        <button class="filter-btn active" onclick="setFilter('all')"><i class="fa fa-list"></i> Toutes</button>
        <button class="filter-btn" onclick="setFilter('active')"><i class="fa fa-hourglass-start"></i> Actives</button>
        <button class="filter-btn" onclick="setFilter('completed')"><i class="fa fa-check-circle"></i> Terminées</button>
        <button class="filter-btn" onclick="setFilter('high')"><i class="fa fa-exclamation-triangle"></i> Urgentes</button>
    </div>

    <div class="input-box">
        <input type="text" id="tInput" placeholder="Ajouter une tâche..." onkeypress="if(event.key === 'Enter') addTask()">
        <select id="pInput">
            <option value="high"><i class="fa fa-exclamation-circle"></i> URGENT</option>
            <option value="low" selected><i class="fa fa-clock"></i> NORMAL</option>
        </select>
        <button class="add-btn" onclick="addTask()"><i class="fa fa-plus"></i></button>
    </div>

    <div id="taskContainer"></div>

    <div class="action-buttons">
        <button class="action-btn-small" onclick="clearCompletedTasks()">
            <i class="fa fa-trash-alt"></i> Nettoyer terminées
        </button>
        <button class="action-btn-small" onclick="exportTasks()">
            <i class="fa fa-download"></i> Exporter
        </button>
    </div>

    <a href="index.html" class="footer-link">
        <i class="fa fa-arrow-left"></i> Retour au Dashboard
    </a>
</div>

<script>
    // ==================== GESTION DES TÂCHES ====================
    let tasks = JSON.parse(localStorage.getItem('umbrella_pro_tasks')) || [];
    let currentFilter = 'all';
    let pomodoroCount = parseInt(localStorage.getItem('pomodoro_count')) || 0;
    let currentCycle = 1;
    
    // ==================== CONFIGURATION PO MODORO ====================
    let focusMinutes = parseInt(localStorage.getItem('focus_minutes')) || 25;
    let breakMinutes = parseInt(localStorage.getItem('break_minutes')) || 5;
    let cyclesBeforeLongBreak = parseInt(localStorage.getItem('cycles_before_long_break')) || 4;
    
    let timeLeft = focusMinutes * 60;
    let timerId = null;
    let isWorking = true;
    
    // Initialiser les champs
    document.getElementById('focusTime').value = focusMinutes;
    document.getElementById('breakTime').value = breakMinutes;
    document.getElementById('cyclesCount').value = cyclesBeforeLongBreak;
    document.getElementById('targetCycles').innerText = cyclesBeforeLongBreak;
    document.getElementById('currentCycle').innerText = currentCycle;
    
    function adjustTime(type, delta) {
        const input = document.getElementById(type === 'focus' ? 'focusTime' : 'breakTime');
        let newVal = parseInt(input.value) + delta;
        if (type === 'focus') {
            newVal = Math.min(60, Math.max(1, newVal));
            focusMinutes = newVal;
            localStorage.setItem('focus_minutes', focusMinutes);
        } else {
            newVal = Math.min(30, Math.max(1, newVal));
            breakMinutes = newVal;
            localStorage.setItem('break_minutes', breakMinutes);
        }
        input.value = newVal;
        updateTimerFromSettings();
    }
    
    function adjustCycles(delta) {
        const input = document.getElementById('cyclesCount');
        let newVal = parseInt(input.value) + delta;
        newVal = Math.min(10, Math.max(1, newVal));
        cyclesBeforeLongBreak = newVal;
        localStorage.setItem('cycles_before_long_break', cyclesBeforeLongBreak);
        input.value = newVal;
        document.getElementById('targetCycles').innerText = cyclesBeforeLongBreak;
        updateTimerFromSettings();
    }
    
    function updateTimerFromSettings() {
        if (timerId) {
            clearInterval(timerId);
            timerId = null;
            document.getElementById('startBtn').style.display = 'flex';
            document.getElementById('pauseBtn').style.display = 'none';
        }
        focusMinutes = parseInt(document.getElementById('focusTime').value);
        breakMinutes = parseInt(document.getElementById('breakTime').value);
        cyclesBeforeLongBreak = parseInt(document.getElementById('cyclesCount').value);
        
        localStorage.setItem('focus_minutes', focusMinutes);
        localStorage.setItem('break_minutes', breakMinutes);
        localStorage.setItem('cycles_before_long_break', cyclesBeforeLongBreak);
        
        if (isWorking) {
            timeLeft = focusMinutes * 60;
        } else {
            timeLeft = breakMinutes * 60;
        }
        updateTimerDisplay();
        showToast(`Focus: ${focusMinutes}min | Pause: ${breakMinutes}min`, 'info');
    }
    
    // ==================== TOAST ====================
    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
        toast.innerHTML = `<i class="fa ${icons[type]}"></i><span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // ==================== FILTRES ====================
    function setFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        render();
    }
    
    function getFilteredTasks() {
        switch(currentFilter) {
            case 'active': return tasks.filter(t => !t.done);
            case 'completed': return tasks.filter(t => t.done);
            case 'high': return tasks.filter(t => t.priority === 'high' && !t.done);
            default: return tasks;
        }
    }
    
    // ==================== CRUD TÂCHES ====================
    function addTask() {
        const input = document.getElementById('tInput');
        const text = input.value.trim();
        const priority = document.getElementById('pInput').value;
        
        if(!text) {
            showToast('Veuillez saisir une tâche', 'warning');
            return;
        }
        
        tasks.push({ 
            id: Date.now(), 
            text: text, 
            priority: priority, 
            done: false,
            createdAt: new Date().toISOString()
        });
        input.value = "";
        save();
        showToast('Tâche ajoutée', 'success');
    }
    
    function toggleTask(id) {
        tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
        save();
        
        const task = tasks.find(t => t.id === id);
        if(task && task.done) {
            showToast('Tâche complétée !', 'success');
        }
    }
    
    function removeTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        save();
        showToast('Tâche supprimée', 'info');
    }
    
    function clearCompletedTasks() {
        const completedCount = tasks.filter(t => t.done).length;
        if(completedCount === 0) {
            showToast('Aucune tâche terminée', 'warning');
            return;
        }
        tasks = tasks.filter(t => !t.done);
        save();
        showToast(`${completedCount} tâche(s) terminée(s) supprimée(s)`, 'success');
    }
    
    function exportTasks() {
        const data = {
            exportDate: new Date().toISOString(),
            tasks: tasks,
            stats: {
                total: tasks.length,
                completed: tasks.filter(t => t.done).length,
                urgent: tasks.filter(t => t.priority === 'high' && !t.done).length
            }
        };
        
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `umbrella_tasks_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('Tâches exportées', 'success');
    }
    
    function save() {
        localStorage.setItem('umbrella_pro_tasks', JSON.stringify(tasks));
        updateStats();
        render();
    }
    
    function updateStats() {
        document.getElementById('totalTasks').innerText = tasks.length;
        document.getElementById('completedTasks').innerText = tasks.filter(t => t.done).length;
        document.getElementById('pomodoroCount').innerText = pomodoroCount;
    }
    
    // ==================== RENDU ====================
    function render() {
        const container = document.getElementById('taskContainer');
        const filteredTasks = getFilteredTasks();
        
        if(filteredTasks.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fa fa-clipboard-list"></i>
                    <p>Aucune tâche ${currentFilter === 'all' ? '' : currentFilter === 'active' ? 'active' : currentFilter === 'completed' ? 'terminée' : 'urgente'}</p>
                    <small>Ajoutez une tâche ci-dessus</small>
                </div>
            `;
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('scoreText').innerText = '0%';
            return;
        }
        
        container.innerHTML = "";
        let completedCount = 0;
        
        const sortedTasks = [...filteredTasks].sort((a, b) => {
            if (a.done !== b.done) return a.done ? 1 : -1;
            if (a.priority !== b.priority) return a.priority === 'high' ? -1 : 1;
            return b.id - a.id;
        });
        
        sortedTasks.forEach(t => {
            if(t.done) completedCount++;
            const div = document.createElement('div');
            div.className = `task-item ${t.done ? 'completed' : ''}`;
            div.innerHTML = `
                <div class="check-btn" onclick="toggleTask(${t.id})">
                    ${t.done ? '<i class="fa fa-check" style="color:#fff; font-size:0.7rem;"></i>' : ''}
                </div>
                <div class="priority-dot ${t.priority === 'high' ? 'p-high' : 'p-low'}"></div>
                <div class="task-info" onclick="toggleTask(${t.id})">
                    <h3>${escapeHtml(t.text)}</h3>
                    <span><i class="fa ${t.priority === 'high' ? 'fa-exclamation-circle' : 'fa-clock'}"></i> ${t.priority === 'high' ? 'Urgent' : 'Normal'}</span>
                </div>
                <button class="del-btn" onclick="removeTask(${t.id})"><i class="fa fa-trash-alt"></i></button>
            `;
            container.appendChild(div);
        });
        
        const percent = tasks.length > 0 ? Math.round((tasks.filter(t => t.done).length / tasks.length) * 100) : 0;
        document.getElementById('progressBar').style.width = percent + "%";
        document.getElementById('scoreText').innerText = percent + "%";
        
        if(percent === 100 && tasks.length > 0) {
            showToast('Félicitations ! Toutes vos tâches sont complétées !', 'success');
        }
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // ==================== POMODORO AVEC TEMPS PERSONNALISABLE ====================
    function updateTimerDisplay() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        const timeStr = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        document.getElementById('timerDisplay').innerText = timeStr;
        document.title = `(${timeStr}) Focus Lab Pro`;
    }
    
    function startTimer() {
        if (timerId) return;
        
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('pauseBtn').style.display = 'flex';
        
        timerId = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timerId);
                timerId = null;
                completeSession();
            } else {
                timeLeft--;
                updateTimerDisplay();
            }
        }, 1000);
    }
    
    function pauseTimer() {
        if (!timerId) return;
        clearInterval(timerId);
        timerId = null;
        document.getElementById('startBtn').style.display = 'flex';
        document.getElementById('pauseBtn').style.display = 'none';
        showToast('Pomodoro en pause', 'info');
    }
    
    function completeSession() {
        if (isWorking) {
            // Fin de session de focus
            pomodoroCount++;
            localStorage.setItem('pomodoro_count', pomodoroCount);
            document.getElementById('pomodoroCount').innerText = pomodoroCount;
            
            // Vérifier si c'est l'heure d'une pause longue
            const isLongBreak = (pomodoroCount % cyclesBeforeLongBreak === 0);
            const breakTime = isLongBreak ? 15 : breakMinutes;
            
            isWorking = false;
            timeLeft = breakTime * 60;
            
            const status = document.getElementById('timerStatus');
            if (isLongBreak) {
                status.innerHTML = '<i class="fa fa-bed"></i> Pause Longue';
                showToast(`Cycle terminé ! Prenez ${breakTime} minutes de pause longue.`, 'success');
            } else {
                status.innerHTML = '<i class="fa fa-coffee"></i> Pause Relax';
                showToast(`Cycle terminé ! Prenez ${breakTime} minutes de pause.`, 'success');
            }
            status.style.color = "var(--success)";
            document.getElementById('timerDisplay').style.color = "var(--success)";
            
        } else {
            // Fin de pause, retour au focus
            isWorking = true;
            timeLeft = focusMinutes * 60;
            currentCycle = Math.floor(pomodoroCount / cyclesBeforeLongBreak) + 1;
            document.getElementById('currentCycle').innerText = currentCycle;
            
            const status = document.getElementById('timerStatus');
            status.innerHTML = '<i class="fa fa-hourglass-half"></i> Session de Focus';
            status.style.color = "var(--accent)";
            document.getElementById('timerDisplay').style.color = "var(--primary)";
            showToast('Fin de la pause ! Retour au travail !', 'success');
        }
        
        updateTimerDisplay();
        
        document.getElementById('startBtn').style.display = 'flex';
        document.getElementById('pauseBtn').style.display = 'none';
        timerId = null;
    }
    
    function resetTimer() {
        clearInterval(timerId);
        timerId = null;
        isWorking = true;
        timeLeft = focusMinutes * 60;
        document.getElementById('startBtn').style.display = 'flex';
        document.getElementById('pauseBtn').style.display = 'none';
        document.getElementById('timerStatus').innerHTML = '<i class="fa fa-hourglass-half"></i> Session de Focus';
        document.getElementById('timerStatus').style.color = "var(--accent)";
        document.getElementById('timerDisplay').style.color = "var(--primary)";
        updateTimerDisplay();
        showToast('Timer réinitialisé', 'info');
    }
    
    // ==================== INITIALISATION ====================
    function init() {
        render();
        updateTimerDisplay();
        updateStats();
        document.getElementById('pomodoroCount').innerText = pomodoroCount;
        document.getElementById('currentCycle').innerText = currentCycle;
        showToast('Focus Lab Pro - Temps personnalisable !', 'info');
    }
    
    window.addEventListener('beforeunload', () => save());
    init();
</script>
</body>
</html>
