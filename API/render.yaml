services:
  - type: web
    name: umbrella-engine
    env: python
    # Installation des dépendances Python + Système
    buildCommand: |
      pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      # Render permet parfois d'installer des paquets via cette variable (selon la stack)
      # Sinon, l'usage d'un Dockerfile est plus robuste pour LibreOffice.
